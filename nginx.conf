server {
    listen 80;
    root /usr/share/nginx/html;

    # Cache images and fonts for 30 days
    location ~* \.(png|jpg|jpeg|webp|gif|ico|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Cache JS/CSS with hashed filenames for 1 year
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — all routes handled by React
    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    root /usr/share/nginx/html;

    # MkDocs static content — served directly
    location /writing/ {
        try_files $uri $uri/index.html =404;
    }
    location /lists/ {
        try_files $uri $uri/index.html =404;
    }

    # Static assets
    location /images/ { }
    location /css/ { }
    location /js/ { }

    # React SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    root /usr/share/nginx/html;

    # Cache images and fonts for 30 days
    location ~* \.(png|jpg|jpeg|webp|gif|ico|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Cache JS/CSS with hashed filenames for 1 year
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache index.html — ensures new deploys are picked up immediately
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback — all routes handled by React.
    # $uri/index.html comes BEFORE $uri/ so prerendered per-post pages
    # (dist/writing/<slug>/index.html) are served inline with a 200 instead
    # of nginx 301-redirecting to add a trailing slash — link-preview bots
    # (iMessage etc.) don't reliably follow redirects.
    location / {
        try_files $uri $uri/index.html $uri/ /index.html;
    }
}

server {
    listen 80;
    root /usr/share/nginx/html;

    # Cache images and fonts for 30 days
    location ~* \.(png|jpg|jpeg|webp|gif|ico|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Cache JS/CSS with hashed filenames for 1 year
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache index.html — ensures new deploys are picked up immediately
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback — all routes handled by React.
    # $uri/index.html comes before the /index.html catch-all so prerendered
    # per-post pages (dist/writing/<slug>/index.html) are served inline with a
    # 200 (link-preview bots like iMessage don't reliably follow redirects).
    # NOTE: no $uri/ clause — section roots (dist/writing/) are real directories
    # with no index.html, and $uri/ would make nginx 301 to a trailing slash and
    # then 403 the dir instead of falling through to the SPA. Dropping it lets
    # /writing and /lists render via React.
    location / {
        try_files $uri $uri/index.html /index.html;
    }
}
